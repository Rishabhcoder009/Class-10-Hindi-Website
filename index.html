<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 10 Hindi Course B Notes Hub</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}

body{background:#f4f6fb;color:#222;transition:.3s}
.dark{background:#0f172a;color:#e5e7eb}

/* HEADER */

header{
background:linear-gradient(120deg,#ff512f,#dd2476);
color:white;
text-align:center;
padding:25px;
font-size:26px;
font-weight:bold;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
padding:15px 20px;
align-items:center
}

.searchBox{
padding:12px;
width:260px;
border-radius:10px;
border:none;
box-shadow:0 3px 10px rgba(0,0,0,.2)
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#dd2476;
color:white;
font-weight:bold
}

.themeBtn{font-size:16px}

/* TABS */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin:10px
}

.tab{
padding:12px 22px;
background:white;
border-radius:25px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.2);
font-weight:bold
}

.activeTab{
background:#dd2476;
color:white
}

.dark .tab{
background:#1e293b;
color:white
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
padding:20px
}

.chapterBox,.notes{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
height:70vh;
overflow:auto
}

.dark .chapterBox,
.dark .notes{
background:#1e293b;
color:white
}

.chapterBtn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#ffe4ec;
border-radius:8px;
cursor:pointer;
text-align:left;
font-weight:600
}

.dark .chapterBtn{
background:#334155;
color:white
}

/* PDF */

iframe{
width:100%;
height:600px;
border:none
}

/* MOBILE FIX */

@media(max-width:900px){

.container{
grid-template-columns:1fr
}

.searchBox{
width:100%
}

iframe{
height:500px
}

}

/* FOOTER */

footer{
background:#111;
color:#ddd;
text-align:center;
padding:25px;
margin-top:30px
}

</style>
</head>

<body>

<header>📕 Class 10 Hindi Course B Notes Hub</header>

<div class="topbar">

<input id="search" class="searchBox" placeholder="Search chapter">

<button class="btn themeBtn" onclick="toggleDark()">
🌙 Theme
</button>

</div>


<div class="tabs">

<div class="tab activeTab" onclick="showSection('sparsh',this)">
SPARSH
</div>

<div class="tab" onclick="showSection('sanchayan',this)">
SANCHAYAN
</div>

<div class="tab" onclick="showSection('samplepapers',this)">
SAMPLE PAPERS
</div>

</div>



<div class="container">

<div class="chapterBox" id="chapters"></div>

<div class="notes" id="notes">
<h2>Welcome</h2>
Select chapter
</div>

</div>



<script>

const data = {

sparsh:{

/* ===== गद्य खंड (Prose) ===== */

"1. बड़े भाई साहब – प्रेमचंद":"pdf/sparsh-1.pdf",
"2. डायरी का एक पन्ना – सीताराम सेकसरिया":"pdf/sparsh-2.pdf",
"3. तताँरा-वामीरो कथा – लीलाधर मंडलोई":"pdf/sparsh-3.pdf",
"4. तीसरी कसम के शिल्पकार शैलेन्द्र – प्रह्लाद अग्रवाल":"pdf/sparsh-4.pdf",
"5. अब कहाँ दूसरे के दुख से दुखी होने वाले – नरेन्द्र कोहली":"pdf/sparsh-5.pdf",
"6. पतझर में टूटी पत्तियाँ – रवीन्द्र कालिया":"pdf/sparsh-6.pdf",
"7. कारतूस – जयशंकर प्रसाद":"pdf/sparsh-7.pdf",

/* ===== पद्य खंड (Poetry) ===== */

"8. साखी – कबीर":"pdf/sparsh-8.pdf",
"9. मीरा के पद – मीराबाई":"pdf/sparsh-9.pdf",
"10. मनुष्यता – मैथिलीशरण गुप्त":"pdf/sparsh-10.pdf",
"11. पर्वत प्रदेश में पावस – सुमित्रानंदन पंत":"pdf/sparsh-11.pdf",
"12. तोप – सर्वेश्वर दयाल सक्सेना":"pdf/sparsh-12.pdf",
"13. कर चले हम फ़िदा – कैफ़ी आज़मी":"pdf/sparsh-13.pdf",
"14. आत्मत्राण – जयशंकर प्रसाद":"pdf/sparsh-14.pdf"


},


sanchayan:{
"हरिहर काका":"pdf/sanchayan-1.pdf",
"सपनों के से दिन":"pdf/sanchayan-2.pdf",
"टोपी शुक्ला":"pdf/sanchayan-3.pdf"
},


samplepapers:{
"Nodia 30 Sample Paper Set":"pdf/nodia-25-26.pdf",
"CBSE Sample Paper 2026 (Yet not uploaded)":"pdf/sample-2026.pdf",
"CBSE Sample Paper 2025 (Yet not uploaded)":"pdf/sample-2025.pdf",
"CBSE Sample Paper 2024 (Yet not uploaded)":"pdf/sample-2024.pdf",
"Practice Paper 1 (Yet not uploaded)":"pdf/practice-1.pdf",
"Practice Paper 2 (Yet not uploaded)":"pdf/practice-2.pdf"
}

}

let currentSection="sparsh"

const chapterBox=document.getElementById("chapters")
const notesBox=document.getElementById("notes")

function showSection(section,el){

currentSection=section

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("activeTab"))

el.classList.add("activeTab")

loadChapters()

}

function loadChapters(){

chapterBox.innerHTML=""

Object.keys(data[currentSection]).forEach(ch=>{

let btn=document.createElement("button")

btn.className="chapterBtn"

btn.innerText=ch

btn.onclick=()=>showNotes(ch,currentSection)

chapterBox.appendChild(btn)

})

}

function showNotes(ch,section){

let pdf=data[section][ch]

let mobile=window.innerWidth<700

if(mobile){

notesBox.innerHTML=`

<h2>${ch}</h2>

<a class="btn" href="${pdf}" target="_blank">
Open PDF
</a>

<br><br>

<a class="btn" href="${pdf}" download>
Download
</a>

`

}else{

notesBox.innerHTML=`

<h2>${ch}</h2>

<iframe src="${pdf}"></iframe>

<br><br>

<a class="btn" href="${pdf}" download>
Download
</a>

`

}

}

function toggleDark(){

document.body.classList.toggle("dark")

}

loadChapters()

</script>



<!-- SAFE INSPECT BLOCK -->

<script>

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){

if(e.key==="F12") e.preventDefault();

if(e.ctrlKey&&e.shiftKey&&e.key==="I") e.preventDefault();

if(e.ctrlKey&&e.shiftKey&&e.key==="C") e.preventDefault();

if(e.ctrlKey&&e.shiftKey&&e.key==="J") e.preventDefault();

if(e.ctrlKey&&e.key==="U") e.preventDefault();

if(e.ctrlKey&&e.key==="S") e.preventDefault();

});

document.addEventListener("selectstart",e=>e.preventDefault());

document.addEventListener("dragstart",e=>e.preventDefault());

</script>
