<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 10 Hindi Course B Notes Hub</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}

body{background:#f4f6fb;color:#222;transition:.3s}
.dark{background:#0f172a;color:#e5e7eb}

header{
background:linear-gradient(120deg,#ff512f,#dd2476);
color:white;
text-align:center;
padding:25px;
font-size:26px;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
padding:15px 20px;
align-items:center
}

.searchBox{
padding:12px;
width:260px;
border-radius:10px;
border:none;
box-shadow:0 3px 10px rgba(0,0,0,.2)
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#dd2476;
color:white;
font-weight:bold;
margin-top:5px;
}

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin:10px
}

.tab{
padding:12px 22px;
background:white;
border-radius:25px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.2);
font-weight:bold
}

.activeTab{
background:#dd2476;
color:white
}

.dark .tab{
background:#1e293b;
color:white
}

.container{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
padding:20px
}

.chapterBox,.notes{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
height:70vh;
overflow:auto
}

.dark .chapterBox,.dark .notes{
background:#1e293b;
color:white
}

.chapterBtn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#ffe4ec;
border-radius:8px;
cursor:pointer;
font-weight:600
}

.dark .chapterBtn{
background:#334155;
color:white
}

embed{
width:100%;
height:65vh;
border-radius:10px;
}

.fullscreenPDF{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:white;
z-index:9999;
padding:10px;
}

.fullscreenPDF embed{
height:90vh;
}

@media(max-width:900px){

.container{grid-template-columns:1fr}

.searchBox{width:100%}

embed{height:60vh}

}

footer{
background:#111;
color:#ddd;
text-align:center;
padding:25px;
margin-top:30px
}

</style>
</head>

<body>

<header>📕 Class 10 Hindi Course B Notes Hub</header>

<div class="topbar">

<input id="search" class="searchBox" placeholder="Search chapter">

<button class="btn" onclick="toggleDark()">Theme</button>

</div>


<div class="tabs">

<div class="tab activeTab" onclick="showSection('sparsh',this)">
SPARSH
</div>

<div class="tab" onclick="showSection('sanchayan',this)">
SANCHAYAN
</div>

<div class="tab" onclick="showSection('samplepapers',this)">
SAMPLE PAPERS
</div>

</div>


<div class="container">

<div class="chapterBox" id="chapters"></div>

<div class="notes" id="notes">

<h2>Welcome</h2>
Select chapter

</div>

</div>


<script>

const data={

sparsh:{
"1. बड़े भाई साहब":"pdf/sparsh-1.pdf",
"2. डायरी का एक पन्ना":"pdf/sparsh-2.pdf",
"3. तताँरा-वामीरो":"pdf/sparsh-3.pdf"
},

sanchayan:{
"हरिहर काका":"pdf/sanchayan-1.pdf"
},

samplepapers:{
"Sample Paper":"pdf/sample.pdf"
}

}

let currentSection="sparsh"

const chapterBox=document.getElementById("chapters")
const notesBox=document.getElementById("notes")


function showSection(section,el){

currentSection=section

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("activeTab"))

el.classList.add("activeTab")

loadChapters()

}


function loadChapters(){

chapterBox.innerHTML=""

Object.keys(data[currentSection]).forEach(ch=>{

let btn=document.createElement("button")

btn.className="chapterBtn"

btn.innerText=ch

btn.onclick=()=>showNotes(ch,currentSection)

chapterBox.appendChild(btn)

})

}


/* SAFE PDF VIEWER */

function showNotes(ch,section){

let pdf=data[section][ch]

notesBox.innerHTML=""

let title=document.createElement("h2")
title.innerText=ch

let container=document.createElement("div")
container.id="pdfContainer"

let fullBtn=document.createElement("button")
fullBtn.className="btn"
fullBtn.innerText="Full Screen"
fullBtn.onclick=toggleFullscreen

let br=document.createElement("br")
let br2=document.createElement("br")

let embed=document.createElement("embed")
embed.src=pdf
embed.type="application/pdf"
embed.style.width="100%"
embed.style.height="65vh"

let download=document.createElement("a")
download.className="btn"
download.href=pdf
download.target="_blank"
download.innerText="Open / Download PDF"

container.appendChild(fullBtn)
container.appendChild(br)
container.appendChild(br2)
container.appendChild(embed)

notesBox.appendChild(title)
notesBox.appendChild(container)
notesBox.appendChild(document.createElement("br"))
notesBox.appendChild(download)

}


function toggleFullscreen(){

let e=document.getElementById("pdfContainer")

if(e){
e.classList.toggle("fullscreenPDF")
}

}


function toggleDark(){
document.body.classList.toggle("dark")
}

loadChapters()

</script>


<script>

document.addEventListener("contextmenu",e=>e.preventDefault())

document.addEventListener("keydown",e=>{

if(e.key==="F12") e.preventDefault()
if(e.ctrlKey&&e.shiftKey&&e.key==="I") e.preventDefault()
if(e.ctrlKey&&e.key==="U") e.preventDefault()

})

</script>


<footer>

<h3>Contact</h3>

<p>Email: rishabhvachheta@gmail.com</p>

<p>© 2026 Hindi Notes Hub</p>

</footer>

</body>
</html>
